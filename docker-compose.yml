services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - apps/api/.env
    ports:
      - "4000:4000"
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev --workspace @groweasy/web"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - api
